name: dependency-update

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  audit-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Run audit (report only, non-blocking)
        id: audit
        run: |
          set +e
          pnpm audit --json > audit.json
          echo "status=$?" >> $GITHUB_OUTPUT
          set -e
      - name: Attempt audit fix
        run: |
          pnpm audit --fix || true
          pnpm install --lockfile-only || true
      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
      - name: Create PR
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: deps/weekly-audit-fix
          base: main
          title: 'chore(deps): weekly npm audit fix'
          commit-message: 'chore(deps): weekly npm audit fix'
          body: |
            Automated weekly dependency update from `dependency-update.yml`.

            Run `pnpm audit` locally to review.
          labels: |
            dependencies
            automerge
          delete-branch: true
