name: Sovereign OS CI

on:
  push:
    branches: [main]
    paths:
      - 'sovereign-intelligence-os/**'
      - '.github/workflows/sovereign-ota.yml'
  pull_request:
    paths:
      - 'sovereign-intelligence-os/**'
  schedule:
    - cron: '0 6 * * 1'

jobs:
  lint-shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint shell scripts
        run: |
          shopt -s globstar
          shellcheck sovereign-intelligence-os/**/*.sh

  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    defaults:
      run:
        working-directory: sovereign-intelligence-os
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check orchestrator tests
      - name: Pytest
        run: pytest -q

  build-wheel:
    runs-on: ubuntu-latest
    needs: [python]
    defaults:
      run:
        working-directory: sovereign-intelligence-os
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: sovereign-wheel
          path: sovereign-intelligence-os/dist/*.whl
