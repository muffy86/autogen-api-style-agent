name: Preview Deploy

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  preview:
    name: Build, deploy preview, smoke test
    runs-on: ubuntu-latest
    # Skip forks — they cannot access VERCEL_TOKEN
    if: github.event.pull_request.head.repo.full_name == github.repository
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel preview env
        run: vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Build (Vercel preview)
        run: vercel build --token="$VERCEL_TOKEN"

      - name: Deploy preview
        id: deploy
        run: |
          set -euo pipefail
          url=$(vercel deploy --prebuilt --token="$VERCEL_TOKEN")
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Preview URL: $url"

      - name: Smoke test preview
        id: smoke
        run: ./scripts/smoke-test.sh "${{ steps.deploy.outputs.url }}"

      - name: Find existing preview comment
        if: always()
        id: preview_comment
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '### Preview deploy'

      - name: Comment preview URL on PR
        if: always()
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.preview_comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ### Preview deploy

            | Field | Value |
            | --- | --- |
            | URL | ${{ steps.deploy.outputs.url || 'deploy failed' }} |
            | Smoke | ${{ steps.smoke.outcome || 'skipped' }} |
            | Commit | `${{ github.event.pull_request.head.sha }}` |
            | Run | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |
          edit-mode: replace
