model_list:
  - model_name: sovereign-uncensored
    litellm_params:
      model: ollama/llama3.2
      api_base: http://127.0.0.1:11434
  - model_name: sovereign-cloud
    litellm_params:
      model: openrouter/anthropic/claude-3.5-sonnet
      api_key: os.environ/OPENROUTER_API_KEY

litellm_settings:
  drop_params: true
  set_verbose: false
