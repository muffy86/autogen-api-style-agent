version: "3.8"

services:
  agent-api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./configs:/app/configs:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  agent-mcp:
    build: .
    command: ["agent", "mcp-serve", "--transport", "sse", "--port", "3000"]
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: unless-stopped
